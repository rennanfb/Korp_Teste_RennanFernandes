<div class="center-container">

<h2 class="base-text">New Product</h2>

<div>
  <input placeholder="Code" [(ngModel)]="product.code" />
</div>

<div>
  <input placeholder="Description" [(ngModel)]="product.description" />
</div>

<div>
  <input type="number" placeholder="Stock" [(ngModel)]="product.stock" />
</div>

<button class="btn-primary" (click)="save()" [disabled]="isLoading">

  <span class="btn-text" [class.hidden]="isLoading">
    Save
  </span>

  <div *ngIf="isLoading" class="loader small spinner-overlay"></div>

</button>

<button class="btn-secondary" routerLink="/products">Back To Product List</button>

<div class="back-home-container">
  <button class="btn-secondary" routerLink="/">Back to Home</button>
</div>


</div>
